aid: cvent-event-cloud
name: Cvent Event Cloud
kind: company
description: >-
  Cvent Event Cloud is the event management product line of the Cvent
  Platform. It supports the full event lifecycle: event creation,
  registration, marketing, agenda and session management, mobile event
  apps, onsite check-in, virtual and hybrid event delivery via the
  Attendee Hub, surveys, and analytics. The Cvent Platform REST API
  exposes Event Cloud resources programmatically using OAuth 2.0
  client credentials, with the token endpoint at
  api-platform.cvent.com/ea/oauth2/token. OpenAPI specifications can
  be downloaded from the developer portal at developers.cvent.com.
