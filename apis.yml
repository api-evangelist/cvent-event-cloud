apis:
  - aid: cvent-event-cloud:rest-api
    name: Cvent Platform REST API (Event Cloud)
    description: >-
      RESTful API for managing events, contacts, registrations, attendees,
      sessions, speakers, exhibitors, surveys, webhooks, and Attendee Hub
      data. Uses OAuth 2.0 client credentials. Authorization code flow is
      available to planner administrators. The OpenAPI specification can
      be downloaded from the API reference.
